<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>For My Love</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="scene" aria-hidden="true">
      <div class="gradient-bg"></div>
      <div class="vignette"></div>
      <div id="canvas-host"></div>
    </div>

    <main class="overlay" aria-live="polite">
      <h1 class="overlay__title">
        For My Love <span class="heart-emoji" aria-hidden="true">❤️</span>
      </h1>
      <p class="overlay__sub">This is Just For You(MaMa)</p>
      <div class="overlay__myanmar" lang="my">
        <p class="overlay__myanmar-line">မမကိုအရမ်းချစ်ပါတယ်</p>
        <p class="overlay__myanmar-line">မောင်ပြောတာတွေ စိတ်မဆိုးနဲ့နော်</p>
        <p class="overlay__myanmar-line overlay__myanmar-line--signoff">
          အာဘွားဗျာ
        </p>
      </div>
    </main>

    <div class="drag-hint" id="drag-hint" role="status">
      <span class="drag-hint__icon" aria-hidden="true">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="36"
          height="36"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0" />
          <path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2" />
          <path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 3v5" />
          <path
            d="M18 8a2 2 0 1 1 4 0v5a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 19"
          />
        </svg>
      </span>
      <p class="drag-hint__text">Touch &amp; hold to drag photos and videos</p>
    </div>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script defer src="js/app.js"></script>
  </body>
</html>
